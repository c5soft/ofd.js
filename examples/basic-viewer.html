<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OFD.js 基础示例</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 16px;
      opacity: 0.9;
    }

    .controls {
      padding: 30px;
      border-bottom: 1px solid #e0e0e0;
      background: #f9f9f9;
    }

    .control-group {
      margin-bottom: 20px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }

    input[type='file'],
    input[type='range'] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    input[type='range'] {
      padding: 5px;
    }

    .scale-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding: 10px;
      background: white;
      border-radius: 4px;
      border: 1px solid #e0e0e0;
    }

    .scale-value {
      font-weight: 600;
      color: #667eea;
      font-size: 18px;
    }

    button {
      padding: 12px 24px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      width: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-secondary {
      background: #e0e0e0;
      color: #333;
      margin-right: 10px;
    }

    .btn-secondary:hover {
      background: #d0d0d0;
    }

    .viewer {
      padding: 30px;
      min-height: 400px;
      background: #f5f5f5;
    }

    .page {
      margin-bottom: 30px;
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    .page-number {
      padding: 10px 15px;
      background: #f0f0f0;
      border-bottom: 1px solid #e0e0e0;
      font-size: 12px;
      font-weight: 600;
      color: #666;
    }

    .page-content {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 300px;
      background: white;
    }

    .status {
      padding: 20px 30px;
      border-top: 1px solid #e0e0e0;
      background: #f9f9f9;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .status-item:last-child {
      margin-bottom: 0;
    }

    .status-label {
      font-weight: 600;
      color: #666;
    }

    .status-value {
      color: #333;
    }

    .status-success {
      color: #4caf50;
      font-weight: 600;
    }

    .status-error {
      color: #f44336;
      font-weight: 600;
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 40px;
      text-align: center;
      color: #667eea;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    .error-box {
      padding: 15px;
      margin-bottom: 20px;
      background: #ffebee;
      border-left: 4px solid #f44336;
      border-radius: 4px;
      color: #c62828;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎨 OFD.js 查看器</h1>
      <p>OpenDocument Format 文档在线查看示例</p>
    </div>

    <div class="controls">
      <div class="control-group">
        <label for="fileInput">选择 OFD 文件：</label>
        <input type="file" id="fileInput" accept=".ofd" />
      </div>

      <div class="control-group">
        <label for="scaleSlider">缩放比例：</label>
        <input
          type="range"
          id="scaleSlider"
          min="0.5"
          max="2"
          step="0.1"
          value="1"
          disabled
        />
        <div class="scale-info">
          <span>当前缩放比例：</span>
          <span class="scale-value" id="scaleValue">100%</span>
        </div>
      </div>

      <div>
        <button class="btn-primary" id="clearBtn" disabled>清空文档</button>
      </div>
    </div>

    <div class="viewer" id="viewer">
      <p style="text-align: center; color: #999; padding: 40px">
        选择一个 OFD 文件开始查看...
      </p>
    </div>

    <div class="status">
      <div class="status-item">
        <span class="status-label">文件状态：</span>
        <span class="status-value" id="fileStatus">未加载</span>
      </div>
      <div class="status-item">
        <span class="status-label">页数：</span>
        <span class="status-value" id="pageCount">-</span>
      </div>
      <div class="status-item">
        <span class="status-label">文件大小：</span>
        <span class="status-value" id="fileSize">-</span>
      </div>
    </div>
  </div>

  <script type="module">
    // 导入 OFD.js 库
    import { parseOfdDocument, renderOfd, setPageScale, getPageScale } from '../dist/ofd.js';

    // DOM 元素
    const fileInput = document.getElementById('fileInput');
    const scaleSlider = document.getElementById('scaleSlider');
    const scaleValue = document.getElementById('scaleValue');
    const viewer = document.getElementById('viewer');
    const clearBtn = document.getElementById('clearBtn');
    const fileStatus = document.getElementById('fileStatus');
    const pageCount = document.getElementById('pageCount');
    const fileSize = document.getElementById('fileSize');

    let currentDocument = null;

    // 格式化文件大小
    function formatFileSize(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
    }

    // 显示加载状态
    function showLoading() {
      viewer.innerHTML =
        '<div class="loading"><div class="spinner"></div><span>正在解析文件...</span></div>';
      fileStatus.textContent = '处理中...';
    }

    // 显示错误
    function showError(error) {
      const errorMsg = error.message || '未知错误';
      viewer.innerHTML = `
        <div class="error-box">
          <strong>错误：</strong> ${errorMsg}
        </div>
      `;
      fileStatus.classList.add('status-error');
      fileStatus.classList.remove('status-success');
      fileStatus.textContent = '加载失败';
    }

    // 渲染文档
    function renderDocument(doc) {
      currentDocument = doc;
      const screenWidth = window.innerWidth - 60;
      const pages = renderOfd(screenWidth, doc);

      viewer.innerHTML = '';
      pages.forEach((pageDiv) => {
        viewer.appendChild(pageDiv);
      });

      // 更新状态
      fileStatus.classList.add('status-success');
      fileStatus.classList.remove('status-error');
      fileStatus.textContent = '✓ 加载成功';
      pageCount.textContent = pages.length;

      // 启用控制
      scaleSlider.disabled = false;
      clearBtn.disabled = false;
    }

    // 文件选择处理
    fileInput.addEventListener('change', (e) => {
      console.log(e)
      const file = e.target.files[0];
      if (!file) return;

      // 更新文件信息
      fileSize.textContent = formatFileSize(file.size);

      // 显示加载状态
      showLoading();

      // 解析 OFD 文件
      parseOfdDocument({
        ofd: file,
        success: (doc) => {
          renderDocument(doc);
        },
        fail: (error) => {
          showError(error);
        },
      });
    });

    // 缩放处理
    scaleSlider.addEventListener('input', (e) => {
      const scale = parseFloat(e.target.value);
      setPageScale(scale);
      scaleValue.textContent = Math.round(scale * 100) + '%';

      // 重新渲染
      if (currentDocument) {
        const screenWidth = (window.innerWidth - 60) * scale;
        const pages = renderOfd(screenWidth, currentDocument);
        viewer.innerHTML = '';
        pages.forEach((pageDiv) => {
          viewer.appendChild(pageDiv);
        });
      }
    });

    // 清空处理
    clearBtn.addEventListener('click', () => {
      fileInput.value = '';
      currentDocument = null;
      viewer.innerHTML =
        '<p style="text-align: center; color: #999; padding: 40px">选择一个 OFD 文件开始查看...</p>';
      fileStatus.classList.remove('status-success', 'status-error');
      fileStatus.textContent = '未加载';
      pageCount.textContent = '-';
      fileSize.textContent = '-';
      scaleSlider.disabled = true;
      scaleSlider.value = 1;
      scaleValue.textContent = '100%';
      clearBtn.disabled = true;
    });

    // 响应式处理
    window.addEventListener('resize', () => {
      if (currentDocument) {
        const screenWidth = window.innerWidth - 60;
        const pages = renderOfd(screenWidth, currentDocument);
        viewer.innerHTML = '';
        pages.forEach((pageDiv) => {
          viewer.appendChild(pageDiv);
        });
      }
    });
  </script>
</body>
</html>
