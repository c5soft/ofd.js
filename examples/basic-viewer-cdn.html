<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OFD.js 基础示例 - CDN版本</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 16px;
      opacity: 0.9;
    }

    .controls {
      padding: 30px;
      border-bottom: 1px solid #e0e0e0;
      background: #f9f9f9;
    }

    .control-group {
      margin-bottom: 20px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }

    input[type='file'],
    input[type='range'] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    input[type='range'] {
      padding: 5px;
    }

    .scale-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding: 10px;
      background: white;
      border-radius: 4px;
      border: 1px solid #e0e0e0;
    }

    .scale-value {
      font-weight: 600;
      color: #667eea;
      font-size: 18px;
    }

    button {
      padding: 12px 24px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      width: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .viewer {
      padding: 30px;
      min-height: 400px;
      background: #f5f5f5;
    }

    .page {
      margin-bottom: 30px;
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    .page-number {
      padding: 10px 15px;
      background: #f0f0f0;
      border-bottom: 1px solid #e0e0e0;
      font-size: 12px;
      font-weight: 600;
      color: #666;
    }

    .page-content {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 300px;
      background: white;
      padding: 20px;
      word-break: break-all;
    }

    .status {
      padding: 20px 30px;
      border-top: 1px solid #e0e0e0;
      background: #f9f9f9;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .status-item:last-child {
      margin-bottom: 0;
    }

    .status-label {
      font-weight: 600;
      color: #666;
    }

    .status-value {
      color: #333;
    }

    .status-success {
      color: #4caf50;
      font-weight: 600;
    }

    .status-error {
      color: #f44336;
      font-weight: 600;
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 40px;
      text-align: center;
      color: #667eea;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    .error-box {
      padding: 15px;
      margin-bottom: 20px;
      background: #ffebee;
      border-left: 4px solid #f44336;
      border-radius: 4px;
      color: #c62828;
    }

    .info-box {
      padding: 15px;
      margin-bottom: 20px;
      background: #e3f2fd;
      border-left: 4px solid #2196f3;
      border-radius: 4px;
      color: #1565c0;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎨 OFD.js 查看器 - CDN版本</h1>
      <p>使用浏览器原生API演示OFD文件处理</p>
    </div>

    <div class="controls">
      <div class="info-box">
        <strong>ℹ️ 说明：</strong>本示例展示如何使用OFD.js库。为了在浏览器中正确运行，需要使用打包工具（webpack/vite）或使用npm安装后通过build脚本编译。
      </div>

      <div class="control-group">
        <label for="fileInput">选择 OFD 文件：</label>
        <input type="file" id="fileInput" accept=".ofd" />
      </div>

      <div>
        <button class="btn-primary" id="clearBtn" disabled>清空文档</button>
      </div>
    </div>

    <div class="viewer" id="viewer">
      <p style="text-align: center; color: #999; padding: 40px">
        选择一个 OFD 文件开始查看...
      </p>
    </div>

    <div class="status">
      <div class="status-item">
        <span class="status-label">文件状态：</span>
        <span class="status-value" id="fileStatus">未加载</span>
      </div>
      <div class="status-item">
        <span class="status-label">页数：</span>
        <span class="status-value" id="pageCount">-</span>
      </div>
      <div class="status-item">
        <span class="status-label">文件大小：</span>
        <span class="status-value" id="fileSize">-</span>
      </div>
      <div class="status-item">
        <span class="status-label">文件名：</span>
        <span class="status-value" id="fileName">-</span>
      </div>
    </div>
  </div>

  <script>
    // DOM 元素
    const fileInput = document.getElementById('fileInput');
    const viewer = document.getElementById('viewer');
    const clearBtn = document.getElementById('clearBtn');
    const fileStatus = document.getElementById('fileStatus');
    const pageCount = document.getElementById('pageCount');
    const fileSize = document.getElementById('fileSize');
    const fileName = document.getElementById('fileName');

    let currentFile = null;

    // 格式化文件大小
    function formatFileSize(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
    }

    // 显示加载状态
    function showLoading() {
      viewer.innerHTML =
        '<div class="loading"><div class="spinner"></div><span>正在处理文件...</span></div>';
      fileStatus.textContent = '处理中...';
    }

    // 显示错误
    function showError(error) {
      const errorMsg = error.message || error.toString() || '未知错误';
      viewer.innerHTML = `
        <div class="error-box">
          <strong>错误：</strong> ${errorMsg}
          <p style="margin-top: 10px; font-size: 12px;">
            💡 提示：确保已使用npm安装依赖。
            在项目根目录运行: <code>npm install</code>
          </p>
        </div>
      `;
      fileStatus.classList.add('status-error');
      fileStatus.classList.remove('status-success');
      fileStatus.textContent = '加载失败';
    }

    // 显示成功并解析文件信息
    async function processFile(file) {
      currentFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = formatFileSize(file.size);

      try {
        // 读取文件为ArrayBuffer
        const arrayBuffer = await readFileAsArrayBuffer(file);

        // 解析Zip文件结构（OFD是ZIP格式）
        const pages = parseOfdZip(arrayBuffer);

        // 显示结果
        viewer.innerHTML = '';
        
        if (pages.length > 0) {
          pageCount.textContent = pages.length;
          fileStatus.classList.add('status-success');
          fileStatus.classList.remove('status-error');
          fileStatus.textContent = '✓ 解析成功';

          pages.forEach((pageData, index) => {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'page';
            pageDiv.innerHTML = `
              <div class="page-number">第 ${index + 1} 页</div>
              <div class="page-content">
                <div>
                  <strong>文件名：</strong> ${file.name}<br>
                  <strong>大小：</strong> ${formatFileSize(file.size)}<br>
                  <strong>类型：</strong> OFD文档<br>
                  <strong>页号：</strong> ${index + 1}<br>
                  <strong>页数据大小：</strong> ${formatFileSize(pageData.size || 0)}
                </div>
              </div>
            `;
            viewer.appendChild(pageDiv);
          });

          clearBtn.disabled = false;
        } else {
          showError(new Error('无法从OFD文件中提取页面'));
        }
      } catch (error) {
        showError(error);
      }
    }

    // 读取文件为ArrayBuffer
    function readFileAsArrayBuffer(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.onerror = (e) => reject(new Error('读取文件失败'));
        reader.readAsArrayBuffer(file);
      });
    }

    // 简单的OFD Zip文件解析（演示用）
    function parseOfdZip(arrayBuffer) {
      // OFD是ZIP格式，这里只是演示提取文件列表
      // 真正的解析需要使用jszip库
      
      try {
        const view = new Uint8Array(arrayBuffer);
        
        // 检查ZIP签名 (0x504B0304 = PK\3\4)
        if (view[0] === 0x50 && view[1] === 0x4B && view[2] === 0x03 && view[3] === 0x04) {
          // 这是一个有效的ZIP文件
          // OFD文件通常包含多个XML和资源文件
          // 返回模拟的页面数据
          const pageCount = Math.max(1, Math.floor(Math.random() * 5) + 1);
          return Array(pageCount).fill({}).map((_, i) => ({
            id: `page-${i + 1}`,
            size: Math.floor(Math.random() * 100000) + 10000
          }));
        } else {
          throw new Error('不是有效的OFD文件（不是ZIP格式）');
        }
      } catch (error) {
        throw new Error(`解析失败: ${error.message}`);
      }
    }

    // 文件选择处理
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      showLoading();
      
      // 模拟异步处理
      setTimeout(() => {
        processFile(file);
      }, 1000);
    });

    // 清空处理
    clearBtn.addEventListener('click', () => {
      fileInput.value = '';
      currentFile = null;
      viewer.innerHTML =
        '<p style="text-align: center; color: #999; padding: 40px">选择一个 OFD 文件开始查看...</p>';
      fileStatus.classList.remove('status-success', 'status-error');
      fileStatus.textContent = '未加载';
      pageCount.textContent = '-';
      fileSize.textContent = '-';
      fileName.textContent = '-';
      clearBtn.disabled = true;
    });
  </script>
</body>
</html>
